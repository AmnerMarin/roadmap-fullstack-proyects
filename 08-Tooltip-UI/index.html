<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolTip UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="toolbar-container">
        <nav>
            <ul>
                <li class="item-con-tooltip">
                    <p>Home</p>
                    <div class="tooltip">Here is home</div>
                </li>
                <li class="item-con-tooltip">
                    <p>Projects</p>
                    <div class="tooltip">Here is everything I have built</div>
                </li>
                <li class="item-con-tooltip">
                    <p>Blog</p>
                    <div class="tooltip">Here is blog</div>
                </li>
            </ul>
        </nav>
    </main>
</body>
</html>
